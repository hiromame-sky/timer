<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- ズームを禁止し、アプリのような操作感にするためのViewport設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ビジュアルタイマー</title>
  
  <!-- ========================================== -->
  <!-- アイコン・iOS（ホーム画面）向け設定          -->
  <!-- ========================================== -->
  
  <!-- モダンブラウザ向けの高画質SVGファビコン -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml">

  <!-- iOS タッチアイコン（ホーム画面用・180x180のPNG画像） -->
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  
  <!-- iOS ホーム画面に追加した際、SafariのUIを消して全画面起動させる設定 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- ホーム画面でのアプリ名（短めが推奨） -->
  <meta name="apple-mobile-web-app-title" content="Timer">
  <!-- ステータスバー（時計や電池の帯）の見た目をアプリに馴染ませる -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- ========================================== -->

  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* ユーザーのテキスト選択や長押しメニューを完全に防止（ネイティブアプリ感を出すため） */
    body {
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overflow: hidden; /* 全画面時の不要なスクロールを防止 */
    }
    /* スワイプ時のブラウザデフォルトのスクロールなどを防ぐ */
    #timer-svg {
      touch-action: none;
    }
  </style>
</head>
<body class="min-h-screen bg-[#f4f7f8] flex flex-col items-center justify-center p-4">

  <div class="mb-6 md:mb-10 text-center">
    <h1 class="text-2xl md:text-3xl font-bold text-gray-700 mb-2">ビジュアルタイマー</h1>
    <p class="text-sm md:text-base text-gray-500">文字盤をドラッグして時間をセット</p>
  </div>

  <div class="flex flex-col items-center gap-8 md:gap-12 w-full max-w-md">
    
    <!-- タイマー本体の外枠 -->
    <div id="timer-frame" class="w-[320px] h-[320px] md:w-[420px] md:h-[420px] rounded-[3rem] md:rounded-[4rem] shadow-2xl p-4 md:p-6 relative transition-colors duration-500 bg-[#9bd4e4]">
      
      <!-- 白い文字盤のコンテナ -->
      <div class="w-full h-full bg-[#fdfdfd] rounded-[2.5rem] md:rounded-[3.2rem] shadow-inner relative overflow-hidden flex items-center justify-center">
        
        <svg id="timer-svg" viewBox="0 0 400 400" class="w-full h-full max-w-[95%] max-h-[95%]">
          <defs>
            <filter id="knob-shadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3" />
            </filter>
          </defs>

          <!-- 静的な目盛りと数字（JavaScriptで生成） -->
          <g id="static-dial"></g>

          <!-- 下部のロゴテキスト -->
          <text x="200" y="360" text-anchor="middle" font-size="14" font-weight="800" fill="#cbd5e1" letter-spacing="3" style="font-family: system-ui, sans-serif;">
            VISUAL TIMER
          </text>

          <!-- 残り時間を示す色付きの扇形 -->
          <path id="time-sector" fill="#185d6e"></path>

          <!-- 中央のノブとポインター -->
          <g id="knob-group" filter="url(#knob-shadow)">
            <rect x="195" y="77" width="10" height="123" fill="#aee0ef" rx="5" />
            <circle cx="200" cy="200" r="30" fill="#aee0ef" />
            <circle cx="200" cy="200" r="22" fill="#9bd4e4" />
          </g>

          <!-- イベント受け取り用の透明なオーバーレイ（盤面全体） -->
          <circle 
            id="interaction-overlay"
            cx="200" cy="200" r="200" 
            fill="transparent" 
            cursor="grab"
          />
        </svg>
      </div>
    </div>

    <!-- 下部のコントロールパネル -->
    <div class="flex items-center gap-4 md:gap-6 bg-white px-6 md:px-8 py-4 rounded-full shadow-lg w-full max-w-sm justify-between">
      
      <!-- デジタル時間表示 -->
      <div id="time-display" class="text-3xl md:text-4xl font-mono font-bold text-gray-700 w-28 text-center tracking-tight">
        45:00
      </div>
      
      <div class="h-10 w-px bg-gray-200"></div>
      
      <!-- ボタン群 -->
      <div class="flex gap-2 md:gap-3">
        <button id="toggle-btn" class="p-3 md:p-4 rounded-full text-white transition-all transform active:scale-95 shadow-lg bg-emerald-500 hover:bg-emerald-600 shadow-emerald-500/30 flex items-center justify-center">
          <i data-lucide="play" id="icon-play" class="ml-0.5 w-6 h-6"></i>
          <i data-lucide="pause" id="icon-pause" class="hidden w-6 h-6"></i>
        </button>
        
        <button id="reset-btn" class="p-3 md:p-4 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors active:scale-95 flex items-center justify-center">
          <i data-lucide="rotate-ccw" class="w-[22px] h-[22px]"></i>
        </button>
        
        <button id="sound-btn" class="p-3 md:p-4 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors active:scale-95 flex items-center justify-center">
          <i data-lucide="volume-2" id="icon-volume-on" class="w-[22px] h-[22px]"></i>
          <i data-lucide="volume-x" id="icon-volume-off" class="hidden w-[22px] h-[22px]"></i>
        </button>
      </div>
    </div>

  </div>

  <script>
    // --- 状態管理 ---
    let remainingSeconds = 2700; // 初期値45分
    let isRunning = false;
    let isSoundEnabled = true;
    let isRinging = false;
    let isDragging = false;
    let intervalId = null;
    let ringTimeoutId = null;

    // --- DOM要素 ---
    const timerFrame = document.getElementById('timer-frame');
    const timeDisplay = document.getElementById('time-display');
    const timeSector = document.getElementById('time-sector');
    const knobGroup = document.getElementById('knob-group');
    const interactionOverlay = document.getElementById('interaction-overlay');
    const toggleBtn = document.getElementById('toggle-btn');
    const iconPlay = document.getElementById('icon-play');
    const iconPause = document.getElementById('icon-pause');
    const resetBtn = document.getElementById('reset-btn');
    const soundBtn = document.getElementById('sound-btn');
    const iconVolumeOn = document.getElementById('icon-volume-on');
    const iconVolumeOff = document.getElementById('icon-volume-off');
    const svgEl = document.getElementById('timer-svg');

    // --- Web Audio API ---
    let audioCtx = null;
    const getAudioContext = () => {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    };

    const initAudio = () => {
      const ctx = getAudioContext();
      if (ctx && ctx.state === 'suspended') {
        ctx.resume();
      }
    };

    const playAlarm = () => {
      const ctx = getAudioContext();
      if (!ctx) return;
      
      isRinging = true;
      updateUI();
      
      if (ringTimeoutId) clearTimeout(ringTimeoutId);
      ringTimeoutId = setTimeout(() => {
        isRinging = false;
        updateUI();
      }, 4000);

      if (!isSoundEnabled) return;

      const playTone = (freq, startTime, duration) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.setValueAtTime(0, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(1, startTime + 0.05);
        gain.gain.setValueAtTime(1, startTime + duration - 0.05);
        gain.gain.linearRampToValueAtTime(0, startTime + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(startTime);
        osc.stop(startTime + duration);
      };

      const now = ctx.currentTime;
      playTone(880, now, 0.15);
      playTone(880, now + 0.25, 0.15);
      playTone(880, now + 0.5, 0.15);
      playTone(880, now + 0.75, 0.4);
    };

    // --- 描画処理 ---
    const drawStaticDial = () => {
      const staticDial = document.getElementById('static-dial');
      let html = '';
      
      for (let i = 0; i < 60; i++) {
        const isMajor = i % 5 === 0;
        const angle = (-90 - i * 6) * (Math.PI / 180);
        
        const outerRadius = 188;
        const innerRadius = isMajor ? 172 : 180;
        const x1 = 200 + innerRadius * Math.cos(angle);
        const y1 = 200 + innerRadius * Math.sin(angle);
        const x2 = 200 + outerRadius * Math.cos(angle);
        const y2 = 200 + outerRadius * Math.sin(angle);
        
        html += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#a0aab0" stroke-width="${isMajor ? 3 : 1.5}" stroke-linecap="round" />`;

        if (isMajor) {
          const textRadius = 145;
          const tx = 200 + textRadius * Math.cos(angle);
          const ty = 200 + textRadius * Math.sin(angle);
          const num = i === 0 ? '0' : i;
          html += `<text x="${tx}" y="${ty}" text-anchor="middle" dominant-baseline="central" font-size="26" font-weight="bold" fill="#3a4b52" style="font-family: system-ui, sans-serif;">${num}</text>`;
        }
      }
      staticDial.innerHTML = html;
    };

    const formatTime = (seconds) => {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    };

    const updateUI = () => {
      // 1. デジタル時間の更新
      timeDisplay.textContent = formatTime(remainingSeconds);

      // 2. SVG扇形の更新
      const ratio = remainingSeconds / 3600;
      const deg = ratio * 360;
      const sectorRadius = 118;

      if (remainingSeconds <= 0) {
        timeSector.setAttribute('d', '');
      } else if (remainingSeconds >= 3600) {
        // SVGのArcは完全な円を描画できないため、2つの半円で描画
        timeSector.setAttribute('d', `M 200 ${200 - sectorRadius} A ${sectorRadius} ${sectorRadius} 0 1 0 200 ${200 + sectorRadius} A ${sectorRadius} ${sectorRadius} 0 1 0 200 ${200 - sectorRadius} Z`);
      } else {
        const angle = (-90 - deg) * (Math.PI / 180);
        const ex = 200 + sectorRadius * Math.cos(angle);
        const ey = 200 + sectorRadius * Math.sin(angle);
        const largeArcFlag = deg > 180 ? 1 : 0;
        const d = `M 200 200 L 200 ${200 - sectorRadius} A ${sectorRadius} ${sectorRadius} 0 ${largeArcFlag} 0 ${ex} ${ey} Z`;
        timeSector.setAttribute('d', d);
      }

      // 3. ノブの回転
      knobGroup.setAttribute('transform', `rotate(${-deg}, 200, 200)`);

      // 4. アラーム時のスタイル変更
      if (isRinging) {
        timerFrame.classList.remove('bg-[#9bd4e4]');
        timerFrame.classList.add('bg-red-400', 'animate-pulse', 'shadow-red-200/50');
      } else {
        timerFrame.classList.remove('bg-red-400', 'animate-pulse', 'shadow-red-200/50');
        timerFrame.classList.add('bg-[#9bd4e4]');
      }

      // 5. ボタン状態の更新
      if (remainingSeconds === 0 && !isRunning) {
        toggleBtn.disabled = true;
        toggleBtn.classList.add('opacity-50', 'cursor-not-allowed');
      } else {
        toggleBtn.disabled = false;
        toggleBtn.classList.remove('opacity-50', 'cursor-not-allowed');
      }

      if (isRunning) {
        toggleBtn.classList.remove('bg-emerald-500', 'hover:bg-emerald-600', 'shadow-emerald-500/30');
        toggleBtn.classList.add('bg-amber-500', 'hover:bg-amber-600', 'shadow-amber-500/30');
        iconPlay.classList.add('hidden');
        iconPause.classList.remove('hidden');
      } else {
        toggleBtn.classList.remove('bg-amber-500', 'hover:bg-amber-600', 'shadow-amber-500/30');
        toggleBtn.classList.add('bg-emerald-500', 'hover:bg-emerald-600', 'shadow-emerald-500/30');
        iconPlay.classList.remove('hidden');
        iconPause.classList.add('hidden');
      }

      // 音量ボタンのアイコン更新
      if (isSoundEnabled) {
        iconVolumeOn.classList.remove('hidden');
        iconVolumeOff.classList.add('hidden');
      } else {
        iconVolumeOn.classList.add('hidden');
        iconVolumeOff.classList.remove('hidden');
      }

      // カーソルの更新
      interactionOverlay.setAttribute('cursor', isDragging ? 'grabbing' : 'grab');
    };

    // --- ロジック ---
    const startTimer = () => {
      if (isRunning) return;
      isRunning = true;
      intervalId = setInterval(() => {
        if (remainingSeconds <= 1) {
          remainingSeconds = 0;
          stopTimer();
          playAlarm();
        } else {
          remainingSeconds--;
        }
        updateUI();
      }, 1000);
      updateUI();
    };

    const stopTimer = () => {
      if (!isRunning) return;
      isRunning = false;
      clearInterval(intervalId);
      updateUI();
    };

    // --- ドラッグ操作 ---
    const getSecondsFromEvent = (e) => {
      const rect = svgEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      
      const dx = clientX - cx;
      const dy = clientY - cy;
      
      if (Math.sqrt(dx * dx + dy * dy) < 30) return null; // 中心すぎたら無視

      let angle = Math.atan2(dy, dx);
      let deg = -(angle + Math.PI / 2) * (180 / Math.PI);
      if (deg < 0) deg += 360;
      
      let seconds = Math.round((deg / 360) * 3600);
      seconds = Math.round(seconds / 60) * 60; // 1分単位にスナップ
      if (seconds > 3600) seconds = 3600;

      return seconds;
    };

    const handlePointerDown = (e) => {
      initAudio();
      isRinging = false;
      isDragging = true;
      
      if (isRunning) stopTimer();

      const seconds = getSecondsFromEvent(e);
      if (seconds !== null) {
        remainingSeconds = seconds;
        updateUI();
      }

      document.addEventListener('pointermove', handlePointerMove, { passive: false });
      document.addEventListener('pointerup', handlePointerUp);
      document.addEventListener('touchmove', handlePointerMove, { passive: false });
      document.addEventListener('touchend', handlePointerUp);
      
      if (e.cancelable) e.preventDefault();
    };

    let prevSeconds = remainingSeconds;
    const handlePointerMove = (e) => {
      if (!isDragging) return;
      
      const seconds = getSecondsFromEvent(e);
      if (seconds !== null) {
        // 0分と60分の境界をまたぐ時の急激なジャンプを防ぐ
        let newSeconds = seconds;
        if (prevSeconds < 300 && seconds > 3300) newSeconds = 0;
        else if (prevSeconds > 3300 && seconds < 300) newSeconds = 3600;
        
        remainingSeconds = newSeconds;
        prevSeconds = newSeconds;
        updateUI();
      }
      
      if (e.cancelable) e.preventDefault();
    };

    const handlePointerUp = () => {
      isDragging = false;
      updateUI();
      document.removeEventListener('pointermove', handlePointerMove);
      document.removeEventListener('pointerup', handlePointerUp);
      document.removeEventListener('touchmove', handlePointerMove);
      document.removeEventListener('touchend', handlePointerUp);
    };

    // --- イベントリスナーの登録 ---
    interactionOverlay.addEventListener('pointerdown', handlePointerDown);
    interactionOverlay.addEventListener('touchstart', handlePointerDown, { passive: false });

    toggleBtn.addEventListener('click', () => {
      initAudio();
      isRinging = false;
      if (remainingSeconds > 0) {
        isRunning ? stopTimer() : startTimer();
      }
    });

    resetBtn.addEventListener('click', () => {
      stopTimer();
      remainingSeconds = 2700;
      isRinging = false;
      updateUI();
    });

    soundBtn.addEventListener('click', () => {
      initAudio();
      isSoundEnabled = !isSoundEnabled;
      updateUI();
    });

    // --- 初期化 ---
    drawStaticDial();
    lucide.createIcons(); // アイコンの描画
    updateUI();

  </script>
</body>
</html>
